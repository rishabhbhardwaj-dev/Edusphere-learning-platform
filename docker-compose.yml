version: '3.8'

services:
  # AI Microservice (Python FastAPI)
  ai-service:
    build: ./ai-service
    container_name: edtech-ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=http://localhost:80,http://frontend:80,http://backend:4000

  # Backend API (Node.js Express)
  backend:
    build: ./server
    container_name: edtech-backend
    ports:
      - "4000:4000"
    depends_on:
      - ai-service
    env_file:
      - ./server/.env
    environment:
      - PORT=4000
      - FRONTEND_URL=http://localhost:80
      - AI_SERVICE_URL=http://ai-service:8000

  # Frontend (React + Nginx)
  frontend:
    build: ./client
    container_name: edtech-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_RAZORPAY_KEY=${VITE_RAZORPAY_KEY}
